services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signalops
      POSTGRES_USER: signalops
      POSTGRES_PASSWORD: signalops
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalops -d signalops"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-migrate:
    image: postgres:16-alpine
    profiles: ["storage"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_MIGRATION_DIR: /workspace/migrations
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/workspace/scripts/apply_postgres_migrations.sh"]
    volumes:
      - .:/workspace:ro

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: signalops_temporal
      POSTGRES_USER: signalops
      POSTGRES_PASSWORD: signalops
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalops -d signalops_temporal"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

  timescaledb-migrate:
    image: timescale/timescaledb:2.17.2-pg16
    profiles: ["storage"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable
      SIGNALOPS_MIGRATION_DIR: /workspace/temporal_migrations
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/workspace/scripts/apply_postgres_migrations.sh"]
    volumes:
      - .:/workspace:ro

  temporal-backfill:
    image: postgres:16-alpine
    profiles: ["storage"]
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/workspace/scripts/backfill_temporal_ledgers.sh"]
    volumes:
      - .:/workspace:ro

  redpanda:
    image: redpandadata/redpanda:v25.3.1
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v3.2.2
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "18080:8080"

  topic-bootstrap:
    image: redpandadata/redpanda:v25.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap/create-topics.sh"]
    environment:
      SIGNALOPS_ENV: local
      SIGNALOPS_BROKERS: redpanda:9092
    volumes:
      - ./deploy/docker/redpanda/create-topics.sh:/bootstrap/create-topics.sh:ro

  gateway:
    build:
      context: .
      target: gateway
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_HTTP_ADDR: ":8080"
      SIGNALOPS_BROKER_PROVIDER: redpanda
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable
      SIGNALOPS_AUTH_ENABLED: ${SIGNALOPS_AUTH_ENABLED:-false}
      SIGNALOPS_AUTH_ISSUER: ${SIGNALOPS_AUTH_ISSUER:-https://auth.syncratic.co/realms/syncratic}
      SIGNALOPS_AUTH_REALM: ${SIGNALOPS_AUTH_REALM:-syncratic}
      SIGNALOPS_AUTH_JWKS_URL: ${SIGNALOPS_AUTH_JWKS_URL:-https://auth.syncratic.co/realms/syncratic/protocol/openid-connect/certs}
      SIGNALOPS_AUTH_AUDIENCE: ${SIGNALOPS_AUTH_AUDIENCE:-signalops-api}
      SIGNALOPS_AUTH_CLIENT_ID: ${SIGNALOPS_AUTH_CLIENT_ID:-signalops-web}
    ports:
      - "18000:8080"

  web:
    build:
      context: ./web
      target: web
      args:
        VITE_SIGNALOPS_AUTH_ENABLED: ${VITE_SIGNALOPS_AUTH_ENABLED:-false}
        VITE_SIGNALOPS_AUTH_ISSUER: ${VITE_SIGNALOPS_AUTH_ISSUER:-https://auth.syncratic.co/realms/syncratic}
        VITE_SIGNALOPS_AUTH_REALM: ${VITE_SIGNALOPS_AUTH_REALM:-syncratic}
        VITE_SIGNALOPS_AUTH_CLIENT_ID: ${VITE_SIGNALOPS_AUTH_CLIENT_ID:-signalops-web}
        VITE_SIGNALOPS_AUTH_AUDIENCE: ${VITE_SIGNALOPS_AUTH_AUDIENCE:-signalops-api}
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "15173:8080"

  massive-puller:
    profiles: ["massive-pull"]
    build:
      context: .
      target: massive-puller
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
    environment:
      SIGNALOPS_BROKER_PROVIDER: redpanda
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_MASSIVE_BASE_URL: ${SIGNALOPS_MASSIVE_BASE_URL:-}
      SIGNALOPS_MASSIVE_API_KEY: ${SIGNALOPS_MASSIVE_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      API_KEY: ${API_KEY:-}
      SIGNALOPS_MASSIVE_TENANT_ID: tenant-local
      SIGNALOPS_MASSIVE_SOURCE_ID: src-massive
      SIGNALOPS_MASSIVE_DATASETS: equity,options
      SIGNALOPS_MASSIVE_MAX_COMPANIES: "50"
      SIGNALOPS_MASSIVE_OPTIONS_LIMIT: "100"
      SIGNALOPS_MASSIVE_REQUEST_DELAY: "250ms"
      SIGNALOPS_MASSIVE_MAX_RETRIES: "1"
      SIGNALOPS_MASSIVE_RETRY_BACKOFF: "1s"
      SIGNALOPS_MASSIVE_MAX_PROVIDER_REQUESTS: "0"
      SIGNALOPS_MASSIVE_MAX_EVENTS_BUILT: "0"
      SIGNALOPS_MASSIVE_MAX_EVENTS_PUBLISHED: "0"
      SIGNALOPS_MASSIVE_DRY_RUN: "true"
      SIGNALOPS_MASSIVE_CONTINUE_ON_ERROR: "true"

  massive-scheduler:
    profiles: ["massive-schedule"]
    build:
      context: .
      target: massive-scheduler
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_BROKER_PROVIDER: redpanda
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable
      SIGNALOPS_MASSIVE_BASE_URL: ${SIGNALOPS_MASSIVE_BASE_URL:-}
      SIGNALOPS_MASSIVE_API_KEY: ${SIGNALOPS_MASSIVE_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      API_KEY: ${API_KEY:-}
      SIGNALOPS_MASSIVE_TENANT_ID: tenant-local
      SIGNALOPS_MASSIVE_SOURCE_ID: src-massive
      SIGNALOPS_MASSIVE_DATASETS: equity,options
      SIGNALOPS_MASSIVE_MAX_COMPANIES: "50"
      SIGNALOPS_MASSIVE_OPTIONS_LIMIT: "100"
      SIGNALOPS_MASSIVE_REQUEST_DELAY: "250ms"
      SIGNALOPS_MASSIVE_MAX_RETRIES: "1"
      SIGNALOPS_MASSIVE_RETRY_BACKOFF: "1s"
      SIGNALOPS_MASSIVE_MAX_PROVIDER_REQUESTS: "0"
      SIGNALOPS_MASSIVE_MAX_EVENTS_BUILT: "0"
      SIGNALOPS_MASSIVE_MAX_EVENTS_PUBLISHED: "0"
      SIGNALOPS_MASSIVE_DRY_RUN: "true"
      SIGNALOPS_MASSIVE_CONTINUE_ON_ERROR: "true"
      SIGNALOPS_MASSIVE_SCHEDULE_INTERVAL: "24h"
      SIGNALOPS_MASSIVE_SCHEDULE_MAX_RUNS: "0"
      SIGNALOPS_MASSIVE_SCHEDULE_RUN_IMMEDIATELY: "true"
      SIGNALOPS_MASSIVE_SCHEDULE_CONTINUE_ON_ERROR: "true"

  raw-worker:
    build:
      context: .
      dockerfile: deploy/docker/python-worker/Dockerfile
      target: python-worker
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_WORKER_INPUT_TOPIC: signalops.local.normalized.v1
      SIGNALOPS_WORKER_RETRY_TOPIC: signalops.local.retry.algorithm.v1
      SIGNALOPS_WORKER_DLQ_TOPIC: signalops.local.dlq.algorithm.v1
      SIGNALOPS_WORKER_SIGNAL_TOPIC: signalops.local.signal.v1
      SIGNALOPS_WORKER_GROUP_ID: signalops.normalized-worker.v1
      SIGNALOPS_WORKER_POLL_TIMEOUT_SECONDS: "1"
      SIGNALOPS_WORKER_DETECTOR_ID: ${SIGNALOPS_WORKER_DETECTOR_ID:-marketops.dsm.taxonomy_v1}
      SIGNALOPS_WORKER_LOG_LEVEL: INFO


  retry-replayer:
    profiles: ["retry-replay"]
    build:
      context: .
      dockerfile: deploy/docker/python-worker/Dockerfile
      target: python-worker
    entrypoint: ["python", "-m", "signalops_workers.retry_replay_main"]
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_RETRY_REPLAY_RAW_TOPIC: signalops.local.raw.v1
      SIGNALOPS_RETRY_REPLAY_INPUT_TOPIC: signalops.local.retry.algorithm.v1
      SIGNALOPS_RETRY_REPLAY_DLQ_TOPIC: signalops.local.dlq.algorithm.v1
      SIGNALOPS_RETRY_REPLAY_GROUP_ID: signalops.retry-replayer.v1
      SIGNALOPS_RETRY_REPLAY_POLL_TIMEOUT_SECONDS: "1"
      SIGNALOPS_RETRY_REPLAY_MAX_ATTEMPTS: "3"
      SIGNALOPS_RETRY_REPLAY_LOG_LEVEL: INFO

  normalizer:
    build:
      context: .
      target: normalizer
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable


  signal-persister:
    build:
      context: .
      target: signal-persister
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable

  replay-worker:
    build:
      context: .
      target: replay-worker
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_DATABASE_URL: postgres://signalops:signalops@postgres:5432/signalops?sslmode=disable
      SIGNALOPS_TEMPORAL_DATABASE_URL: postgres://signalops:signalops@timescaledb:5432/signalops_temporal?sslmode=disable
      SIGNALOPS_REPLAY_WORKER_ID: signalops-replay-worker
      SIGNALOPS_REPLAY_ONESHOT: "false"
      SIGNALOPS_REPLAY_MAX_RECORDS: "50"
      SIGNALOPS_REPLAY_BATCH_SIZE: "50"
      SIGNALOPS_REPLAY_PUBLISH_MAX_ATTEMPTS: "3"
      SIGNALOPS_REPLAY_POLL_INTERVAL: "5s"


volumes:
  redpanda-data:
  postgres-data:
  timescaledb-data:
