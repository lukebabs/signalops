services:
  redpanda:
    image: redpandadata/redpanda:v25.3.1
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v3.2.2
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "18080:8080"

  topic-bootstrap:
    image: redpandadata/redpanda:v25.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap/create-topics.sh"]
    environment:
      SIGNALOPS_ENV: local
      SIGNALOPS_BROKERS: redpanda:9092
    volumes:
      - ./deploy/docker/redpanda/create-topics.sh:/bootstrap/create-topics.sh:ro

  gateway:
    build:
      context: .
      target: gateway
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
    environment:
      SIGNALOPS_HTTP_ADDR: ":8080"
      SIGNALOPS_BROKER_PROVIDER: redpanda
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
    ports:
      - "18000:8080"

  raw-worker:
    build:
      context: .
      dockerfile: deploy/docker/python-worker/Dockerfile
      target: python-worker
    depends_on:
      redpanda:
        condition: service_healthy
      topic-bootstrap:
        condition: service_completed_successfully
    environment:
      SIGNALOPS_BROKER_BROKERS: redpanda:9092
      SIGNALOPS_ENV: local
      SIGNALOPS_WORKER_INPUT_TOPIC: signalops.local.raw.v1
      SIGNALOPS_WORKER_RETRY_TOPIC: signalops.local.retry.algorithm.v1
      SIGNALOPS_WORKER_DLQ_TOPIC: signalops.local.dlq.algorithm.v1
      SIGNALOPS_WORKER_GROUP_ID: signalops.raw-worker.v1
      SIGNALOPS_WORKER_POLL_TIMEOUT_SECONDS: "1"
      SIGNALOPS_WORKER_DETECTOR_ID: signalops.noop
      SIGNALOPS_WORKER_LOG_LEVEL: INFO

volumes:
  redpanda-data:
